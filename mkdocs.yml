site_name: Loop Engineering
site_description: >-
  A knowledge base for loop engineering with Claude Code — designing autonomous
  agent loops that observe, plan, act, verify, and iterate.
site_url: https://lucagattoni.github.io/Claude-Loops/
site_author: Luca Gattoni
copyright: Loop Engineering — a Claude Code knowledge base

repo_url: https://github.com/lucagattoni/Claude-Loops
repo_name: lucagattoni/Claude-Loops
edit_uri: edit/main/docs/

# docs/ is the source; LOOP_ENGINEERING.md + README.md stay the GitHub repo landing.
docs_dir: docs

# Broken internal links/anchors warn (promoted to errors under `--strict` in CI).
# Intentional absolute github.com links to repo files are left alone.
validation:
  omitted_files: warn
  absolute_links: ignore
  unrecognized_links: warn
  links:
    anchors: warn

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    # Light
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    # Left column — collapsible navigation tree
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - navigation.indexes
    # Right column — on-this-page TOC (kept separate, NOT integrated, so it stays a 3rd column)
    - toc.follow
    # Search + code ergonomics
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

plugins:
  - search

# External links open in a new tab with an external-link icon (see the JS + CSS below).
extra_css:
  - stylesheets/external-links.css
extra_javascript:
  - javascripts/external-links.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lucagattoni/Claude-Loops

# Left navigation — grouped as in LOOP_ENGINEERING.md (foundational → advanced).
